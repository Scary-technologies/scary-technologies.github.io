<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>نقشه توریستی هوشمند</title>
    
    <link rel="stylesheet" href="lib/leaflet/leaflet.css" />
    <script src="lib/leaflet/leaflet.js"></script>

    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <header class="app-header">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="جستجوی مکان..." oninput="searchLocation()">
            <span class="search-icon">🔍</span>
        </div>
        <div id="searchResults" class="search-results"></div>
    </header>

    <div class="coordinates-display" id="coords-box">X: 0 , Y: 0</div>

    <div class="fab-container">
        <button class="fab-btn" onclick="toggleFullscreen()" title="تمام صفحه">🖥️</button>
    </div>

    <div id="map"></div>

    <div class="bottom-sheet" id="bottomSheet">
        <div class="sheet-handle" onclick="closeSheet()"></div>
        <button class="close-sheet-btn" onclick="closeSheet()">×</button>
        
        <div class="sheet-content">
            <div class="sheet-header">
                <h3 id="sheetTitle">نام مکان</h3>
                <span id="sheetBadge" class="sheet-badge">وضعیت</span>
            </div>
            
            <div class="gallery-container">
                <div class="gallery-wrapper" id="galleryWrapper"></div>
                <button class="gallery-nav prev" onclick="moveGallery(-1)">❯</button>
                <button class="gallery-nav next" onclick="moveGallery(1)">❮</button>
            </div>

            <p id="sheetDesc" class="sheet-desc">توضیحات مکان...</p>
            
            <div class="sheet-info-grid">
                <div class="info-item">
                    <span class="info-label">🕒 ساعت کاری:</span>
                    <span id="sheetTime" class="info-value">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">📞 شماره تماس:</span>
                    <a id="sheetPhone" href="#" class="info-value phone-link">--</a>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
